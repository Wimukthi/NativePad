name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # GitHub-hosted runners switch JavaScript actions from Node 20 to Node 24 on
  # 2026-06-16. Opt in now so action compatibility is checked before release.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    name: ${{ matrix.configuration }} x64
    runs-on: windows-2025-vs2026

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild NativePad.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /m

      - name: Test
        run: .\bin\x64\${{ matrix.configuration }}\NativePad.Tests.exe
