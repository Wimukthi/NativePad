name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: ${{ matrix.configuration }} x64
    runs-on: windows-2025-vs2026

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3

      - name: Build
        run: msbuild NativePad.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /m

      - name: Test
        run: .\bin\x64\${{ matrix.configuration }}\NativePad.Tests.exe
